name: Refresh football data

on:
  schedule:
    - cron: "20 6 * * 1"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Refresh, validate and export
        run: python scripts/10_run_full_pipeline.py
      - name: Verify non-empty outputs
        run: python -c "from pathlib import Path; p=Path('output/powerbi/fact_transfers.csv'); assert p.exists() and p.stat().st_size > 100"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: football-recruitment-refresh-${{ github.run_id }}
          path: |
            output/reports/
            output/logs/
            output/snapshots/
            output/powerbi/
          retention-days: 14
          if-no-files-found: error

