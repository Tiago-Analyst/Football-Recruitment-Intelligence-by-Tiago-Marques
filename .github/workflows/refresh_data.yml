name: Refresh football data

on:
  schedule:
    - cron: "20 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Refresh, validate and export
        run: python scripts/10_run_full_pipeline.py
      - name: Verify deployable warehouse and exports
        run: |
          python -c "from app.warehouse import validate_warehouse; from pathlib import Path; validate_warehouse(Path('database/football_recruitment.duckdb'))"
          python -c "from pathlib import Path; p=Path('output/powerbi/fact_transfers.csv'); assert p.exists() and p.stat().st_size > 100"
      - name: Publish the latest validated warehouse
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view data-latest >/dev/null 2>&1; then
            gh release upload data-latest database/football_recruitment.duckdb --clobber
          else
            gh release create data-latest database/football_recruitment.duckdb --title "Latest validated football warehouse" --notes "Automatically generated by the validated weekly data pipeline."
          fi
      - name: Create public warehouse manifest
        run: >-
          python scripts/11_create_release_manifest.py
          --database database/football_recruitment.duckdb
          --output database/latest.json
          --repository "${{ github.repository }}"
          --version "${{ github.run_id }}"
      - name: Publish manifest to the deployment branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add database/latest.json
          git commit -m "data: publish warehouse ${{ github.run_id }} [skip ci]"
          git push
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: football-recruitment-refresh-${{ github.run_id }}
          path: |
            database/latest.json
            output/reports/
            output/logs/
            output/snapshots/
            output/powerbi/
          retention-days: 14
          if-no-files-found: warn
